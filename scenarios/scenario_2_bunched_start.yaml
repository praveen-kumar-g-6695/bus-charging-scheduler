name: "Scenario 2 - Bunched start"
description: >
  Buses from both directions depart in a tight cluster (every 8 min) over the
  first 50 minutes, then space out. Creates heavy early contention.
reference_time: "19:00"

route:
  name: "Bengaluru-Kochi Highway"
  origin: "Bengaluru"
  destination: "Kochi"
  total_length_km: 540
  stops:
    - station: "A"
      position_km: 100
    - station: "B"
      position_km: 220
    - station: "C"
      position_km: 320
    - station: "D"
      position_km: 440

weights:
  individual: 1.0
  operator: 1.0
  overall: 1.0

fleet_defaults:
  range_km: 240
  speed_kmph: 60

# direction: forward = Bengaluru->Kochi, reverse = Kochi->Bengaluru
trips:
  - { bus_id: "bus-BK-01", operator: "kpn",      direction: "forward", departure: "19:00" }
  - { bus_id: "bus-BK-02", operator: "freshbus", direction: "forward", departure: "19:08" }
  - { bus_id: "bus-BK-03", operator: "flixbus",  direction: "forward", departure: "19:16" }
  - { bus_id: "bus-BK-04", operator: "kpn",      direction: "forward", departure: "19:24" }
  - { bus_id: "bus-BK-05", operator: "freshbus", direction: "forward", departure: "19:32" }
  - { bus_id: "bus-BK-06", operator: "flixbus",  direction: "forward", departure: "19:40" }
  - { bus_id: "bus-BK-07", operator: "kpn",      direction: "forward", departure: "19:48" }
  - { bus_id: "bus-BK-08", operator: "freshbus", direction: "forward", departure: "20:03" }
  - { bus_id: "bus-BK-09", operator: "flixbus",  direction: "forward", departure: "20:18" }
  - { bus_id: "bus-BK-10", operator: "kpn",      direction: "forward", departure: "20:33" }
  - { bus_id: "bus-KB-01", operator: "freshbus", direction: "reverse", departure: "19:00" }
